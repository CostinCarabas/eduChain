name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, lint, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace (debug)
        run: cargo build --workspace

      - name: Run all tests (scenario + unit)
        run: cargo test --workspace

  build_wasm:
    name: Build WASM artefacts
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install multiversx-sc-meta
        run: cargo install multiversx-sc-meta --locked

      - name: Build WASM for all contracts
        run: |
          for c in contracts/edu-chain-nft contracts/ect-token contracts/ect-escrow contracts/ect-anchor; do
            echo "Building $c..."
            (cd "$c/meta" && cargo run -- build)
          done

      - name: Upload WASM artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-outputs
          path: |
            contracts/*/output/*.mxsc.json
            contracts/*/output/*.wasm
            contracts/*/output/*.abi.json
